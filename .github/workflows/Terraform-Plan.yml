name: 'Terraform Plan'
on:
    pull_request:
        branches:
            - prod

env:
    TF_CLOUD_ORGANIZATION: 'CloudQuickLab' # Replace with your Terraform Cloud organization name
    TF_WORKSPACE: 'PlanDryRun' # Replace with your Terraform Cloud workspace name
    TF_API_TOKEN: ${{ secrets.TF_API_TOKEN }} # Set this secret in your GitHub repository settings
    CONFIG_DIRECTORY: './' # Directory containing your Terraform configuration files

jobs:
    terraform-plan:
        if: github.repository == 'shivakpkp/terraform-azure-linux-vm'
        name: 'Terraform Plan'
        runs-on: ubuntu-latest
        permissions:
            contents: read
            pull-requests: write
        steps:
        - name: Checkout code
          uses: actions/checkout@v3

        - name: Upload Configuration
          uses: hashicorp/tfc-workflows-github/actions/upload-configuration@v1.3.2
          id: plan-upload
          with:
            organization: ${{ env.TF_CLOUD_ORGANIZATION }}
            token: ${{ env.TF_API_TOKEN }}
            workspace: ${{ env.TF_WORKSPACE }}
            directory: ${{ env.CONFIG_DIRECTORY }}
            speculative: true

        - name: Create Plan Run
          uses: hashicorp/tfc-workflows-github/actions/create-run@v1.0.0
          id: plan-run
          with:
            workspace: ${{ env.TF_WORKSPACE }}
            configuration_version: ${{ steps.plan-upload.outputs.configuration_version_id }}
            plan_only: true
        
        - name: Get Plan Output
          uses: hashicorp/tfc-workflows-github/actions/plan-output@v1.0.0
          id: plan-output
          with:
            plan: ${{ fromJson(steps.plan-run.outputs.payload).data.relationships.plan.data.id }}

        - name: Update PR
          uses: actions/github-script@v6
          id: plan-comment
          with:
            github-token: ${{ secrets.GITHUB_TOKEN }}
            script: |
                // 1. Retrieve existing bot comments for the PR
                const { data: comments } = await github.rest.issues.listComments({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.issue.number,
                });
                const botComment = comments.find(comment => {
                  return comment.user.type === 'Bot' && comment.body.includes('HCP Terraform Plan Output')
                });
                const output = `#### HCP Terraform Plan Output
                    \`\`\`
                    Plan: ${{ steps.plan-output.outputs.add }} to add, ${{ steps.plan-output.outputs.change }} to change, ${{ steps.plan-output.outputs.destroy }} to destroy.
                    \`\`\`
                    [HCP Terraform Plan](${{ steps.plan-run.outputs.run_link }})
                    `;
                // 3. Delete previous comment so PR timeline makes sense
                if (botComment) {
                  github.rest.issues.deleteComment({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    comment_id: botComment.id,
                  });
                }
                github.rest.issues.createComment({
                  issue_number: context.issue.number,
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  body: output
                });
