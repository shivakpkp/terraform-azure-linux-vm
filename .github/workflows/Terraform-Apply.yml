name: 'Terraform Apply'
on:
  push:
    branches: [ prod, dev ]

env:
    TF_CLOUD_ORGANIZATION: 'CloudQuickLab' # Replace with your Terraform Cloud organization name
    TF_WORKSPACE: 'PlanDryRun' # Replace with your Terraform Cloud workspace name
    TF_API_TOKEN: ${{ secrets.TF_API_TOKEN }} # Set this secret in your GitHub repository settings
    CONFIG_DIRECTORY: './' # Directory containing your Terraform configuration files

jobs:
  terraform-apply:
    if: github.repository == 'shivakpkp/terraform-azure-linux-vm'
    name: 'Terraform Apply'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Upload Configuration
        uses: hashicorp/tfc-workflows-github/actions/upload-configuration@v1.3.2
        id: apply-upload
        with:
          organization: ${{ env.TF_CLOUD_ORGANIZATION }}
          token: ${{ env.TF_API_TOKEN }}
          workspace: ${{ env.TF_WORKSPACE }}
          directory: ${{ env.CONFIG_DIRECTORY }}

      - name: Create Apply Run
        uses: hashicorp/tfc-workflows-github/actions/create-run@v1.0.0
        id: apply-run
        with:
          workspace: ${{ env.TF_WORKSPACE }}
          configuration_version: ${{ steps.apply-upload.outputs.configuration_version_id }}

      - name: Apply
        uses: hashicorp/tfc-workflows-github/actions/apply-run@v1.0.0
        id: apply
        with:
          run_id: ${{ steps.apply-run.outputs.run_id }}
          comment: "Apply Run From GitHub Actions CI ${{ github.sha }}"